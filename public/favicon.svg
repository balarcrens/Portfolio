<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#f97316" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Outer technical dashboard circle -->
    <circle cx="50" cy="50" r="44" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.25" />
    
    <!-- Glowing neon monogram 'C' shape -->
    <path d="M68 28C60 18 45 16 34 24C20 33 16 52 26 67C36 82 56 84 68 72" stroke="url(#logo-grad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Central high-tech crosshair accent -->
    <path d="M42 50H72" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
</svg>
